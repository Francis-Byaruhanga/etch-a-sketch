<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css"/>
    <script src="scripts.js" defer></script>
</head>
<body>
    <!-- Toy shell -->
    <div class="toy" id="toy">
        <!-- Title -->
        <div class="title-bar">
            <div class="dot"></div>
            <h1>Etch . a . Sketch</h1>
            <div class="dot"></div>
        </div>

        <!-- Screen -->
        <div class="screen-bezel">
            <div id="grid-container"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <!--Right Knob -->
            <div class="knob-wrap">
                <div class="knob" id="knob-left" title="Shake to clear!"></div>
                <span class="knob-label">Shake</span>
            </div>

            <!-- Center controls -->
            <div class="center-controls">
                <div class="mode-pills">
                    <button class="pill active" data-mode="random" title="Random color per stroke">🎨 Random</button>
                    <button class="pill" data-mode="darken" title="Darken 10% each hover">🌑 Darken</button>
                    <button class="pill" data-mode="classic" title="Single color fill">✏️ Classic</button>
                </div>
                <button class="btn btn-primary" id="btn-resize">⊞ New Grid Size</button>
                <button class="btn btn-secondary" id="btn-clear">✕ Clear</button>
                <span class="size-display" id="size-display">16 × 16</span>
            </div>

            <!--Right Knob -->
            <div class="knob-wrap">
                <div class="knob" id="knob-right" title="Shake to clear!"></div>
                <span class="knob-label">Shake</span>
            </div>

        </div>
    </div>
</body>
</html>
